    <!-- JSON-LD: Organization + WebSite. Establishes a stable knowledge-graph
         entity for "YTGrowth" so Google can confidently group brand searches
         under a single host card with sitelinks. Both blocks share the same
         @id so the SoftwareApplication.publisher above and any future schema
         can reference one canonical Organization. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "@id": "https://ytgrowth.io/#organization",
          "name": "YTGrowth",
          "url": "https://ytgrowth.io",
          "logo": {
            "@type": "ImageObject",
            "url": "https://ytgrowth.io/favicon.svg",
            "contentUrl": "https://ytgrowth.io/favicon.svg"
          },
          "description": "YTGrowth is a YouTube analytics tool and AI channel audit platform for creators who want to grow without spending hours decoding dashboards.",
          "contactPoint": {
            "@type": "ContactPoint",
            "email": "support@ytgrowth.io",
            "contactType": "customer support",
            "availableLanguage": ["en"]
          },
          "sameAs": [
            "https://www.linkedin.com/company/113100340/",
            "https://x.com/ytgrowth_x",
            "https://www.facebook.com/ytgrowthfb",
            "https://www.producthunt.com/products/ytgrowth"
          ]
        },
        {
          "@type": "WebSite",
          "@id": "https://ytgrowth.io/#website",
          "url": "https://ytgrowth.io",
          "name": "YTGrowth",
          "description": "The YouTube growth tool that turns analytics into action. Channel audits, SEO, thumbnail and competitor analysis in one.",
          "inLanguage": "en-US",
          "publisher": { "@id": "https://ytgrowth.io/#organization" }
        }
      ]
    }
    </script>

    <!-- Self-hosted fonts. Replaces the render-blocking Google Fonts CSS
         (googleapis -> gstatic chain) that was the bulk of the mobile LCP
         render delay. The variable woff2 files cover every weight; @font-face
         is inlined so there's no external font stylesheet to block render, and
         DM Sans (the hero/LCP face) is preloaded so it's ready by first paint,
         which avoids the fallback->web-font swap (no CLS). -->
    <link rel="preload" href="/fonts/dm-sans-latin.woff2" as="font" type="font/woff2" crossorigin/>
    <style>
      @font-face { font-family: 'DM Sans'; font-style: normal; font-weight: 100 1000; font-display: swap; src: url('/fonts/dm-sans-latin.woff2') format('woff2'); }
      @font-face { font-family: 'Inter'; font-style: normal; font-weight: 100 900; font-display: swap; src: url('/fonts/inter-latin.woff2') format('woff2'); }
      @font-face { font-family: 'Plus Jakarta Sans'; font-style: normal; font-weight: 200 800; font-display: swap; src: url('/fonts/plus-jakarta-latin.woff2') format('woff2'); }
      @font-face { font-family: 'Manrope'; font-style: normal; font-weight: 200 800; font-display: swap; src: url('/fonts/manrope-latin.woff2') format('woff2'); }
    </style>
    <!-- Paddle and Affonso are loaded lazily from main.jsx, not on initial
         parse, so they stop pulling profitwell.js + paddle.css onto the
         critical path. They fire on first user interaction, OR a 2.5s
         timeout, whichever comes first. See loadThirdParty() in main.jsx. -->
    <!-- Google tag (gtag.js): one load serves both the Google Ads tag
         (AW-10883831151) and the GA4 analytics property (G-MFMVT6Q5RB). -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-10883831151"></script>
    <script>
      // Analytics suppression, shared by GA4 + Ads AND Ahrefs below. Two
      // independent reasons NOT to record a visit:
      //   1. Non-production host. localhost, 127.0.0.1, LAN IPs and Railway
      //      preview domains all fire the PROD tags otherwise, so every
      //      dev/preview page view pollutes real traffic. Only ytgrowth.io
      //      (and www) is treated as production.
      //   2. Owner opt-out. Load any page once with ?ytg_notrack=1 to stop
      //      your own visits being recorded on this browser; ?ytg_track=1
      //      re-enables. Persists in localStorage, so it survives a dynamic
      //      IP and works on every device you opt in on.
      // window.__ytgTrack is the single source of truth: true = record.
      (function(){try{
        var h=location.hostname;
        var isProd=(h==='ytgrowth.io'||h==='www.ytgrowth.io');
        var p=new URLSearchParams(location.search);
        if(p.has('ytg_notrack'))localStorage.setItem('ytg_notrack','1');
        if(p.has('ytg_track'))localStorage.removeItem('ytg_notrack');
        var optedOut=localStorage.getItem('ytg_notrack')==='1';
        window.__ytgTrack=(isProd&&!optedOut);
        if(!window.__ytgTrack){window['ga-disable-AW-10883831151']=true;window['ga-disable-G-MFMVT6Q5RB']=true;}
      }catch(e){window.__ytgTrack=false;}})();
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'AW-10883831151');
      gtag('config', 'G-MFMVT6Q5RB');
    </script>

    <!-- Ahrefs Web Analytics. Canonical static tag, verbatim, so Ahrefs'
         installation check detects it. Note: unlike GA, this is NOT gated
         by window.__ytgTrack, because the gated/renamed variant failed
         Ahrefs verification. Ahrefs has no per-visitor opt-out, so this
         records owner + dev visits too; Ahrefs' own bot filtering aside,
         that's the trade-off for reliable detection. -->
    <script src="https://analytics.ahrefs.com/analytics.js" data-key="NYeHh1Ga901GDZ9oU9W3aQ" async></script>
