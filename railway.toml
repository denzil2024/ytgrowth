# Tell Railway to build the project with the repo-root Dockerfile
# instead of nixpacks. The Dockerfile uses Docker layer caching so the
# pip install step is reused across deploys, cutting ~5 min off most
# builds. The previous nixpacks.toml is kept on disk as documentation
# but is ignored when the DOCKERFILE builder is selected here.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# startCommand intentionally NOT set here. Railway runs Dockerfile-builder
# startCommands directly (no shell), so "$PORT" gets passed as a literal
# string and uvicorn crashes with "Invalid value for '--port': '$PORT'".
# The Dockerfile's CMD already wraps uvicorn in `sh -c "..."` so $PORT is
# expanded properly — letting that CMD run is the correct path.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
